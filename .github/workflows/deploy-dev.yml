name: Deploy — Dev (AWS)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: 137738968757.dkr.ecr.us-east-1.amazonaws.com/huron-dev-backend
  ECR_FRONTEND: 137738968757.dkr.ecr.us-east-1.amazonaws.com/huron-dev-frontend
  ECS_CLUSTER: huron-dev-cluster
  BACKEND_SERVICE: huron-dev-backend
  FRONTEND_SERVICE: huron-dev-frontend
  ALB_URL: http://huron-dev-alb-1576743853.us-east-1.elb.amazonaws.com

jobs:
  build-backend:
    name: Build & Push — Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image=${{ env.ECR_BACKEND }}:$SHA" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.image }},${{ env.ECR_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image=${{ env.ECR_FRONTEND }}:$SHA" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.image }},${{ env.ECR_FRONTEND }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.ALB_URL }}
            BACKEND_URL=${{ env.ALB_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS Dev
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Force redeploy
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.BACKEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.FRONTEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.BACKEND_SERVICE }} ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}
      - name: Health check
        run: |
          STATUS=$(curl -sf ${{ env.ALB_URL }}/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          [ "$STATUS" = "healthy" ] && echo "Health: $STATUS" || (echo "FAILED: $STATUS"; exit 1)
      - name: Summary
        run: |
          echo "### Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ${{ env.ALB_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **API docs** | ${{ env.ALB_URL }}/docs |" >> $GITHUB_STEP_SUMMARY
