name: Deploy — Staging (AWS)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: 137738968757.dkr.ecr.us-east-1.amazonaws.com/huron-staging-backend
  ECR_FRONTEND: 137738968757.dkr.ecr.us-east-1.amazonaws.com/huron-staging-frontend
  ECS_CLUSTER: huron-staging-cluster
  BACKEND_SERVICE: huron-staging-backend
  FRONTEND_SERVICE: huron-staging-frontend

jobs:
  build-backend:
    name: Build & Push — Backend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image=${{ env.ECR_BACKEND }}:staging-$SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.image }},${{ env.ECR_BACKEND }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image=${{ env.ECR_FRONTEND }}:staging-$SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.image }},${{ env.ECR_FRONTEND }}:staging-latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_ALB_URL }}
            BACKEND_URL=${{ vars.STAGING_ALB_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: staging
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force redeploy
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.BACKEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.FRONTEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.BACKEND_SERVICE }} ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Health check
        run: |
          STATUS=$(curl -sf ${{ vars.STAGING_ALB_URL }}/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          [ "$STATUS" = "healthy" ] && echo "Health: $STATUS" || (echo "STAGING HEALTH FAILED: $STATUS"; exit 1)

      - name: Summary
        run: |
          echo "### Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ${{ vars.STAGING_ALB_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **API docs** | ${{ vars.STAGING_ALB_URL }}/docs |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend image** | ${{ needs.build-backend.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend image** | ${{ needs.build-frontend.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
