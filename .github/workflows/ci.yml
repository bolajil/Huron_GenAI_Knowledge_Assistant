name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_production.txt
      - run: pip install -r requirements_production.txt pytest
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --junitxml=reports/unit.xml
        env:
          DATABASE_URL: ""
          SQLITE_DB_PATH: /tmp/huron_unit_test.db
          JWT_SECRET_KEY: unit-test-jwt-secret-32-bytes-xx
          MCP_ENCRYPTION_KEY: unit-test-mcp-key-32-bytes-xxxxx
          VECTOR_BACKEND: faiss
          REDIS_URL: ""
          OPENAI_API_KEY: sk-test-placeholder
          PINECONE_API_KEY: ""
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit.xml

  frontend-check:
    name: Frontend — TypeScript + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npx next lint
        working-directory: frontend

  integration:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: huron_test
          POSTGRES_USER: huron
          POSTGRES_PASSWORD: hurontest
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U huron -d huron_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_production.txt
      - run: pip install -r requirements_production.txt requests pytest
      - name: Start backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8004 &
          sleep 5
          curl -f http://localhost:8004/health
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://huron:hurontest@localhost:5432/huron_test
          JWT_SECRET_KEY: test-jwt-secret-key-32-bytes-xx
          MCP_ENCRYPTION_KEY: test-mcp-key-32-bytes-xxxxxxxx
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test-placeholder
          PINECONE_API_KEY: ""
          VECTOR_BACKEND: faiss
          PYTHONPATH: .
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short --junitxml=reports/integration.xml
        env:
          BACKEND_URL: http://localhost:8004
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration.xml

  docker-build:
    name: Docker — Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.production
          push: false
          load: true
          tags: huron-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile.production
          push: false
          load: true
          tags: huron-frontend:ci
          build-args: NEXT_PUBLIC_API_URL=http://localhost:8004
          cache-from: type=gha
          cache-to: type=gha,mode=max
