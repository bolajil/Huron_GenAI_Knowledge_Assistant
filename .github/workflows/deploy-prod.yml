name: Deploy — Production (AWS)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  # Update when prod Terraform is applied
  ECR_BACKEND: 137738968757.dkr.ecr.us-east-1.amazonaws.com/huron-prod-backend
  ECR_FRONTEND: 137738968757.dkr.ecr.us-east-1.amazonaws.com/huron-prod-frontend
  ECS_CLUSTER: huron-prod-cluster
  BACKEND_SERVICE: huron-prod-backend
  FRONTEND_SERVICE: huron-prod-frontend
  PROD_URL: https://api.huronconsultinggroup.com

jobs:
  gate:
    name: Production Gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          [ "${{ github.event.inputs.confirm }}" = "DEPLOY" ] || (echo "Must type DEPLOY"; exit 1)
      - run: echo "Gate approved"

  build-backend:
    name: Build & Push — Backend
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image=${{ env.ECR_BACKEND }}:prod-$SHA" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.image }},${{ env.ECR_BACKEND }}:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image=${{ env.ECR_FRONTEND }}:prod-$SHA" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.image }},${{ env.ECR_FRONTEND }}:prod-latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.PROD_URL }}
            BACKEND_URL=${{ env.PROD_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Force redeploy
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.BACKEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.FRONTEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.BACKEND_SERVICE }} ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}
      - name: Health check
        run: |
          STATUS=$(curl -sf ${{ env.PROD_URL }}/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          [ "$STATUS" = "healthy" ] && echo "Health: $STATUS" || (echo "PROD HEALTH FAILED: $STATUS"; exit 1)
      - name: Summary
        run: |
          echo "### Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ env.PROD_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend image** | ${{ needs.build-backend.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend image** | ${{ needs.build-frontend.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
