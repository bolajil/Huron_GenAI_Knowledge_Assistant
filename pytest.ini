[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests (no external deps, SQLite)
    integration: Integration tests (requires PostgreSQL + Redis from docker-compose.test.yml)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
